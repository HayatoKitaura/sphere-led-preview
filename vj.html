<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sphere VJ Studio — 球体LED VJジェネレーター</title>
<style>
  :root { --accent:#ee3333; }
  html,body { margin:0; height:100%; background:#050505; overflow:hidden;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif; color:#ddd; }
  #app { position:fixed; inset:0; }
  #flatWrap { position:fixed; inset:0; display:none; place-items:center; background:#000; z-index:1; }
  #flatView { max-width:96vw; max-height:92vh; box-shadow:0 0 0 1px #333; }
  .card { background:rgba(10,10,10,.9); border:1px solid #333; border-radius:10px; backdrop-filter:blur(6px); }
  #panel { position:fixed; top:14px; left:14px; z-index:10; padding:13px 14px; width:308px;
    max-height:calc(100vh - 28px); overflow:auto; }
  #panel h1 { font-size:13px; margin:0 0 2px; letter-spacing:.06em; color:#fff; }
  #panel .sub { font-size:10.5px; color:#888; margin-bottom:10px; }
  .loadgrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
  label.btn { display:block; text-align:center; cursor:pointer; background:#222; color:#ccc;
    border:1px solid #444; border-radius:6px; padding:7px 0; font-size:11.5px; }
  label.btn:hover { border-color:#777; }
  label.btn.bg { grid-column:1 / -1; background:var(--accent); color:#fff; border:none; font-weight:600; }
  label.btn.set { background:#1b3a1b; border-color:#2a5a2a; color:#cfc; }
  .presets { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin:4px 0 2px; }
  .presets button { background:#181818; color:#ddd; border:1px solid #3a3a3a; border-radius:6px; padding:6px 0; font-size:10.5px; cursor:pointer; letter-spacing:.03em; }
  .presets button:hover { border-color:var(--accent); color:#fff; }
  .orow { display:grid; grid-template-columns:auto 1fr; gap:6px; align-items:center; margin:5px 0; }
  .orow span { font-size:11px; color:#aaa; }
  select { background:#1a1a1a; color:#ddd; border:1px solid #444; border-radius:5px; padding:4px; font-size:11.5px; width:100%; }
  .ctl { margin:7px 0; }
  .ctl label { font-size:11px; color:#aaa; margin-bottom:3px; display:flex; justify-content:space-between; }
  .ctl label span { color:#fff; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  input[type=file] { display:none; }
  .row { display:flex; gap:6px; margin:8px 0; }
  .row button { flex:1; background:#222; color:#ccc; border:1px solid #444; border-radius:6px; padding:7px 0; font-size:12px; cursor:pointer; }
  .row button:hover { border-color:#777; } .row button.on { background:#444; color:#fff; border-color:#888; }
  #exportmp4 { background:var(--accent); color:#fff; border:none; font-weight:600; }
  #status { font-size:11px; color:#9b9; margin-top:8px; min-height:1.4em; line-height:1.5; }
  #status.rec { color:#f77; }
  .divider { height:1px; background:#2a2a2a; margin:10px 0; }
  .lbl { font-size:10.5px; color:#777; margin:6px 0 2px; display:flex; justify-content:space-between; align-items:center; }
  .lbl input[type=color] { width:26px; height:18px; border:none; background:none; padding:0; cursor:pointer; }
  #err { position:fixed; inset:0; display:none; place-items:center; z-index:20; background:#100; color:#f99; font-size:14px; padding:40px; text-align:center; line-height:1.8; }
</style>
</head>
<body>
<div id="app"></div>
<div id="flatWrap"><canvas id="flatView"></canvas></div>

<div id="panel" class="card">
  <h1>SPHERE VJ STUDIO</h1>
  <div class="sub">球体LED 1920×992 ／ VJジェネレーター（加算発光・ブルーム・粒子）</div>

  <div class="lbl">プリセット（パターン）</div>
  <div class="presets" id="presets"></div>

  <div class="divider"></div>
  <div class="loadgrid">
    <label class="btn bg" for="fBg">背景画像/動画を読み込む（任意）</label>
    <label class="btn" for="f0" id="l0">ロゴ 1</label>
    <label class="btn" for="f1" id="l1">ロゴ 2</label>
    <label class="btn" for="f2" id="l2">ロゴ 3</label>
    <div></div>
  </div>
  <input id="fBg" type="file" accept="image/*">
  <input id="f0" type="file" accept="image/*">
  <input id="f1" type="file" accept="image/*">
  <input id="f2" type="file" accept="image/*">

  <div class="lbl">各ロゴの軌道</div>
  <div class="orow"><span>ロゴ 1</span><select id="o0"></select></div>
  <div class="orow"><span>ロゴ 2</span><select id="o1"></select></div>
  <div class="orow"><span>ロゴ 3</span><select id="o2"></select></div>

  <div class="divider"></div>
  <div class="lbl">背景エフェクト</div>
  <select id="bg" style="margin-bottom:6px">
    <option value="embers">エンバー（浮遊する光）</option>
    <option value="droprain">エナジードロップ降下</option>
    <option value="starfield">スターフィールド</option>
    <option value="grid">ネオングリッド</option>
    <option value="radial">放射パルス</option>
    <option value="tunnel">トンネル</option>
    <option value="noir">ノワール（漆黒・微光スイープ）</option>
    <option value="none">なし（黒）</option>
  </select>

  <div class="divider"></div>
  <div class="ctl"><label>ロゴサイズ <span id="vSize"></span></label><input id="size" type="range" min="0.10" max="0.40" step="0.01" value="0.22"></div>
  <div class="ctl"><label>周回速度（1ループの周回数）<span id="vSpeed"></span></label><input id="speed" type="range" min="1" max="4" step="1" value="1"></div>
  <div class="ctl"><label>ループ長 <span id="vLoop"></span></label><input id="loop" type="range" min="4" max="16" step="1" value="8"></div>
  <div class="ctl"><label>縦回数（螺旋/斜め）<span id="vVsw"></span></label><input id="vsweep" type="range" min="1" max="4" step="1" value="1"></div>
  <div class="ctl"><label>軌道の散らし <span id="vSpread"></span></label><input id="spread" type="range" min="0" max="180" step="10" value="120"></div>
  <div class="ctl"><label>拍動 <span id="vPulse"></span></label><input id="pulse" type="range" min="0" max="0.20" step="0.01" value="0.06"></div>
  <div class="ctl"><label>ブルーム（発光）<span id="vBloom"></span></label><input id="bloom" type="range" min="0" max="60" step="1" value="26"></div>
  <div class="ctl"><label>光の尾（トレイル）<span id="vTrail"></span></label><input id="trail" type="range" min="0" max="14" step="1" value="6"></div>
  <div class="ctl"><label>色相回転 <span id="vCycle"></span></label><input id="cycle" type="range" min="0" max="3" step="1" value="0"></div>
  <div class="ctl"><label>ストロボ <span id="vStrobe"></span></label><input id="strobe" type="range" min="0" max="12" step="1" value="0"></div>
  <div class="ctl"><label>背景の密度/流れ <span id="vBg"></span></label><input id="bgspd" type="range" min="1" max="4" step="1" value="2"></div>
  <div class="ctl"><label>グレイン <span id="vGrain"></span></label><input id="grain" type="range" min="0" max="0.12" step="0.01" value="0.05"></div>

  <div class="lbl">アクセント色 <input id="accent" type="color" value="#ee3333"></div>

  <div class="row">
    <button id="play" class="on">再生中</button>
    <button id="dir" class="on">順回り</button>
  </div>
  <div class="row">
    <button id="mirror">ミラー</button>
    <button id="vignette" class="on">周辺減光</button>
    <button id="poles" class="on">極を暗く</button>
  </div>
  <div class="row">
    <button id="view">表示：球</button>
    <button id="guide">ガイド</button>
  </div>
  <div class="row"><button id="exportmp4">MP4で書き出し（高画質・30fps・完全ループ）</button></div>
  <div class="row"><button id="export">WebMで書き出し</button></div>
  <div id="status">プリセットを押す or ロゴを読み込んでください</div>
</div>

<div id="err">three.js を読み込めませんでした。<b>vendor</b> フォルダを同じ場所に置いてください。</div>

<script src="vendor/three.min.js"></script>
<script src="vendor/OrbitControls.js"></script>
<script src="vendor/mp4-muxer.min.js"></script>
<script>
(function () {
  if (typeof THREE === 'undefined') { document.getElementById('err').style.display = 'grid'; return; }
  var W = 1920, H = 992, TAU = Math.PI * 2, MAXWARP = 5;
  var cv = document.createElement('canvas'); cv.width = W; cv.height = H; var ctx = cv.getContext('2d');
  var gcv = document.createElement('canvas'); gcv.width = W; gcv.height = H; var gctx = gcv.getContext('2d'); // glow buffer

  // film grain tile
  var noise = document.createElement('canvas'); noise.width = noise.height = 256;
  (function () { var nc = noise.getContext('2d'), id = nc.createImageData(256, 256), d = id.data;
    for (var i = 0; i < d.length; i += 4) { var v = (160 + Math.random() * 95) | 0; d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255; } nc.putImageData(id, 0, 0); })();

  var ORBITS = [['h','横（赤道）'],['v','縦（極を通る）'],['d','斜め ↗'],['d2','斜め ↘'],['ring','リング（緯度違い）'],['helix','螺旋'],['fig8','8の字'],['wave','波打ち'],['center','中央（静止/微動）']];

  var state = { size:0.22, speed:1, loop:8, vsweep:1, spread:120, pulse:0.06, bloom:26, trail:6,
    cycle:0, strobe:0, bgspd:2, grain:0.05, bg:'embers', accent:'#ee3333',
    dir:1, playing:true, showFlat:false, guide:false, poles:true, mirror:false, vignette:true };
  var bgImg = null, logos = [null, null, null], orbit = ['h', 'v', 'd'];

  function hexRgb(h){ h=(h||'#ee3333').replace('#',''); if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; var n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
  function aRGBA(al){ var c=hexRgb(state.accent); return 'rgba('+c[0]+','+c[1]+','+c[2]+','+al+')'; }
  function hot(al){ var c=hexRgb(state.accent); var m=function(x){return Math.round(x+(255-x)*0.55);}; return 'rgba('+m(c[0])+','+m(c[1])+','+m(c[2])+','+al+')'; }
  function R(){ return Math.random(); }

  // particles (seamless: integer cycles/loop)
  var embers=[]; for(var i=0;i<150;i++) embers.push({x:R(),y0:R(),sp:1+((R()*3)|0),r:6+R()*40,br:0.18+R()*0.5,par:0.4+R()*0.9,drift:(R()-0.5)*60});
  var stars=[]; for(var i=0;i<180;i++) stars.push({x:R(),y:R(),r:0.5+R()*2.2,tw:1+((R()*3)|0),ph:R()});

  function softDot(c,x,y,r,col){ var g=c.createRadialGradient(x,y,0,x,y,r); g.addColorStop(0,col); g.addColorStop(0.5,col.replace(/[\d.]+\)$/,'0.25)')); g.addColorStop(1,'rgba(0,0,0,0)'); c.fillStyle=g; c.beginPath(); c.arc(x,y,r,0,TAU); c.fill(); }
  function drawCover(img,shift){ var s=Math.max(W/img.width,H/img.height),w=img.width*s,h=img.height*s,x0=(W-w)/2+shift,y0=(H-h)/2; for(var dx=-W;dx<=W;dx+=W) ctx.drawImage(img,x0+dx,y0,w,h); }

  // ---- backgrounds (drawn into glow buffer for bloom) ----
  function bgEmbers(c,p){ c.save(); c.globalCompositeOperation='lighter';
    for(var i=0;i<embers.length;i++){ var e=embers[i]; var x=e.x*W + Math.sin(TAU*(p*e.sp+e.x))*e.drift;
      var y=(1 - ((((e.y0 + p*e.sp*state.bgspd)%1)+1)%1))*(H*1.2)-H*0.1;
      var tw=0.6+0.4*Math.sin(TAU*(p*e.sp*2+e.x*6)); softDot(c,x,y,e.r*e.par,aRGBA(e.br*tw)); } c.restore(); }
  function bgDrop(c,p){ c.save(); c.globalCompositeOperation='lighter';
    for(var i=0;i<embers.length;i++){ var e=embers[i]; var x=e.x*W + Math.sin(TAU*(p*e.sp))*e.drift*0.4;
      var y=((((e.y0 + p*e.sp*state.bgspd)%1)+1)%1)*(H*1.25)-H*0.12;
      // streak
      var len=e.r*1.6+30; var grd=c.createLinearGradient(x,y,x,y+len); grd.addColorStop(0,aRGBA(e.br)); grd.addColorStop(1,'rgba(0,0,0,0)');
      c.fillStyle=grd; c.fillRect(x-2.2,y,4.4,len); softDot(c,x,y,e.r*0.5,hot(e.br)); } c.restore(); }
  function bgStars(c,p){ c.save(); c.globalCompositeOperation='lighter';
    for(var i=0;i<stars.length;i++){ var s=stars[i]; var a=0.2+0.8*(0.5+0.5*Math.sin(TAU*(p*s.tw+s.ph)));
      softDot(c,s.x*W,s.y*H,s.r*4,(i%6===0?aRGBA(a):'rgba(255,255,255,'+a+')')); } c.restore(); }
  function bgGrid(c,p){ c.save(); c.globalCompositeOperation='lighter'; c.strokeStyle=aRGBA(0.5); c.lineWidth=2;
    var sy=H/12, oy=((p*state.bgspd)%1)*sy; for(var y=-sy;y<H+sy;y+=sy){ c.beginPath(); c.moveTo(0,y+oy); c.lineTo(W,y+oy); c.stroke(); }
    var sx=W/24, ox=((p*state.bgspd)%1)*sx; for(var x=-sx;x<W+sx;x+=sx){ c.beginPath(); c.moveTo(x+ox,0); c.lineTo(x+ox,H); c.stroke(); } c.restore(); }
  function bgRadial(c,p){ c.save(); c.globalCompositeOperation='lighter'; c.translate(W/2,H/2); c.lineWidth=5;
    for(var k=0;k<6;k++){ var f=(((p*2 + k/6)%1)+1)%1; c.strokeStyle=aRGBA((1-f)*0.7); c.beginPath(); c.arc(0,0,f*W*0.6,0,TAU); c.stroke(); } c.restore(); }
  function bgTunnel(c,p){ c.save(); c.globalCompositeOperation='lighter'; c.translate(W/2,H/2); c.lineWidth=4;
    for(var k=0;k<10;k++){ var f=(((-p*2 + k/10)%1)+1)%1; c.strokeStyle=aRGBA(f*0.6); c.beginPath(); c.arc(0,0,f*W*0.65+10,0,TAU); c.stroke(); } c.restore(); }
  function bgNoir(c,p){ c.save(); c.globalCompositeOperation='lighter';
    var br=0.05+0.035*(0.5+0.5*Math.sin(TAU*p)); softDot(c,W*0.5,H*0.5,H*1.0,aRGBA(br));
    var cx=-W*0.4 + p*W*1.8, bw=260; var g=c.createLinearGradient(cx-bw,0,cx+bw,0);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(0.5,aRGBA(0.12)); g.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=g; c.fillRect(cx-bw,0,bw*2,H); c.restore(); }
  function drawBgGlow(c,p){ switch(state.bg){ case 'noir': bgNoir(c,p); break; case 'droprain': bgDrop(c,p); break; case 'starfield': bgStars(c,p); break; case 'grid': bgGrid(c,p); break; case 'radial': bgRadial(c,p); break; case 'tunnel': bgTunnel(c,p); break; case 'none': break; default: bgEmbers(c,p); } }

  // ---- orbits ----
  function orbitPos(type,node,theta){ var inc=type==='v'?Math.PI/2:0; var x=Math.sin(theta),z=Math.cos(theta);
    var y1=-z*Math.sin(inc),z1=z*Math.cos(inc),x1=x; var xr=x1*Math.cos(node)+z1*Math.sin(node); var zr=-x1*Math.sin(node)+z1*Math.cos(node);
    return { lon:Math.atan2(xr,zr), lat:Math.asin(Math.max(-1,Math.min(1,y1))) }; }
  function pathPos(type,k,n,p){ var phase=n>1?k/n:0, spreadRad=state.spread*Math.PI/180, s=state.dir*state.speed;
    if(type==='h'||type==='v'){ var node=phase*spreadRad, theta=TAU*((p*s)+phase); var pos=orbitPos(type,node,theta); return {u:0.5+pos.lon/TAU,lat:pos.lat}; }
    if(type==='d'||type==='d2'){ var u=phase+p*s, vs=type==='d'?-1:1, lf=((phase+p*state.vsweep*vs)%1+1)%1; return {u:u,lat:(0.5-lf)*Math.PI}; }
    if(type==='ring'){ return {u:phase+p*s,lat:(phase-0.5)*Math.PI*0.7}; }
    if(type==='helix'){ return {u:phase+p*s,lat:Math.sin(TAU*(p*state.vsweep+phase))*Math.PI*0.45}; }
    if(type==='fig8'){ var a=TAU*(p*s+phase); return {u:0.5+Math.sin(a)*0.5,lat:Math.sin(2*a)*Math.PI*0.4}; }
    if(type==='wave'){ var uu=phase+p*s; return {u:uu,lat:Math.sin(TAU*(uu*2))*Math.PI*0.18}; }
    if(type==='center'){ var a=TAU*(p*s+phase); return {u:0.5+0.045*Math.sin(a), lat:0.06*Math.sin(a*0.5+1)}; }
    return {u:0.5,lat:0}; }
  function drawLogoOn(c,img,u,lat,baseH,alpha){ u=(u%1+1)%1; var xpx=u*W, ypx=(0.5-lat/Math.PI)*H, warp=1/Math.max(Math.cos(lat),1/MAXWARP);
    var h=baseH, w=baseH*img.width/img.height*warp; c.globalAlpha=alpha;
    for(var dx=-W;dx<=W;dx+=W) c.drawImage(img,xpx+dx-w/2,ypx-h/2,w,h); c.globalAlpha=1; }
  function present(){ var a=[]; for(var i=0;i<3;i++) if(logos[i]) a.push(i); return a; }

  // logos: glow copies (trails) into glow buffer, then crisp on main
  function drawLogosGlow(c,p){ var pr=present(),n=pr.length; c.save(); c.globalCompositeOperation='lighter';
    for(var idx=0;idx<n;idx++){ var i=pr[idx],img=logos[i],type=orbit[i];
      var sc=1+state.pulse*Math.sin(TAU*(2*p)+idx*1.7), baseH=state.size*H*sc;
      var trail=state.trail|0;
      for(var j=trail;j>=1;j--){ var pp=(((p - j*0.012*state.speed)%1)+1)%1; var pos=pathPos(type,idx,n,pp);
        if(state.cycle) c.filter='hue-rotate('+(((p*360*state.cycle)+idx*70)%360)+'deg)';
        drawLogoOn(c,img,pos.u,pos.lat,baseH*(0.85+0.15*(1-j/(trail+1))),(1-j/(trail+1))*0.5);
        if(state.mirror) drawLogoOn(c,img,pos.u+0.5,-pos.lat,baseH,(1-j/(trail+1))*0.3);
        c.filter='none'; }
      // bright current copy into glow for a hot core
      var cur=pathPos(type,idx,n,p); if(state.cycle) c.filter='hue-rotate('+(((p*360*state.cycle)+idx*70)%360)+'deg)';
      drawLogoOn(c,img,cur.u,cur.lat,baseH,0.7); c.filter='none';
    } c.restore(); }
  function drawLogosCrisp(c,p){ var pr=present(),n=pr.length;
    for(var idx=0;idx<n;idx++){ var i=pr[idx],img=logos[i],type=orbit[i];
      var sc=1+state.pulse*Math.sin(TAU*(2*p)+idx*1.7), baseH=state.size*H*sc; var pos=pathPos(type,idx,n,p);
      if(state.cycle) c.filter='hue-rotate('+(((p*360*state.cycle)+idx*70)%360)+'deg)';
      drawLogoOn(c,img,pos.u,pos.lat,baseH,1);
      if(state.mirror) drawLogoOn(c,img,pos.u+0.5,-pos.lat,baseH,0.5);
      c.filter='none'; } }

  function poles(c){ if(!state.poles) return; var t=c.createLinearGradient(0,0,0,H*0.2); t.addColorStop(0,'rgba(0,0,0,0.9)'); t.addColorStop(1,'rgba(0,0,0,0)'); c.fillStyle=t; c.fillRect(0,0,W,H*0.2);
    var b=c.createLinearGradient(0,H,0,H*0.8); b.addColorStop(0,'rgba(0,0,0,0.9)'); b.addColorStop(1,'rgba(0,0,0,0)'); c.fillStyle=b; c.fillRect(0,H*0.8,W,H*0.2); }
  function vignette(c){ if(!state.vignette) return; var g=c.createRadialGradient(W/2,H/2,H*0.28,W/2,H/2,W*0.62); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.5)'); c.fillStyle=g; c.fillRect(0,0,W,H); }
  function grain(c,p){ if(state.grain<=0) return; c.save(); c.globalAlpha=state.grain; c.globalCompositeOperation='overlay';
    var ox=((p*53)%1)*256, oy=((p*97)%1)*256; var pat=c.createPattern(noise,'repeat'); c.translate(-ox,-oy); c.fillStyle=pat; c.fillRect(ox,oy,W,H); c.restore(); }
  function strobe(c,p){ if(state.strobe<=0) return; if(Math.floor(p*state.strobe*2)%2===1){ c.save(); c.globalAlpha=0.28; c.globalCompositeOperation='lighter'; c.fillStyle='#fff'; c.fillRect(0,0,W,H); c.restore(); } }
  function guideDraw(c){ c.strokeStyle='rgba(85,119,204,0.7)'; c.lineWidth=3; c.beginPath(); c.moveTo(0,H/2); c.lineTo(W,H/2); c.stroke();
    c.strokeStyle='rgba(204,51,51,0.8)'; c.beginPath(); c.moveTo(W/2,0); c.lineTo(W/2,H); c.stroke();
    c.strokeStyle='rgba(255,255,255,0.5)'; c.setLineDash([14,14]); c.beginPath(); c.moveTo(2,0); c.lineTo(2,H); c.moveTo(W-2,0); c.lineTo(W-2,H); c.stroke(); c.setLineDash([]);
    c.fillStyle='rgba(255,255,255,.6)'; c.font='34px sans-serif'; c.textAlign='center'; c.fillText('FRONT',W/2,44); c.fillText('BACK 継ぎ目',150,H/2-16); c.fillText('BACK 継ぎ目',W-150,H/2-16); }

  function render(p) {
    // base + core glow
    ctx.fillStyle = '#030305'; ctx.fillRect(0, 0, W, H);
    if (bgImg) drawCover(bgImg, ((p * state.bgspd * 0.25) % 1) * W);
    var cg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, H*0.72);
    cg.addColorStop(0, aRGBA(0.16)); cg.addColorStop(0.6, aRGBA(0.04)); cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg; ctx.fillRect(0, 0, W, H);

    // build glow buffer (bg fx + logo trails)
    gctx.clearRect(0, 0, W, H);
    drawBgGlow(gctx, p);
    drawLogosGlow(gctx, p);

    // bloom: blurred additive + crisp additive of the glow buffer
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    if (state.bloom > 0) { ctx.filter = 'blur(' + state.bloom + 'px)'; ctx.globalAlpha = 0.95; ctx.drawImage(gcv, 0, 0); ctx.filter = 'blur(' + Math.round(state.bloom * 2.4) + 'px)'; ctx.globalAlpha = 0.6; ctx.drawImage(gcv, 0, 0); ctx.filter = 'none'; }
    ctx.globalAlpha = 0.9; ctx.drawImage(gcv, 0, 0); ctx.restore();

    // crisp logos on top
    drawLogosCrisp(ctx, p);

    strobe(ctx, p); poles(ctx); grain(ctx, p); vignette(ctx);
    if (state.guide && !recording) guideDraw(ctx);
    tex.needsUpdate = true;
    if (state.showFlat) { fctx.clearRect(0, 0, fv.width, fv.height); fctx.drawImage(cv, 0, 0, fv.width, fv.height); }
  }

  // ---- three.js ----
  var renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight); renderer.outputEncoding = THREE.sRGBEncoding;
  document.getElementById('app').appendChild(renderer.domElement);
  var scene = new THREE.Scene(); scene.background = new THREE.Color(0x050505);
  var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100); camera.position.set(0, 0.4, 3.4);
  var controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.minDistance = 1.4; controls.maxDistance = 8;
  var tex = new THREE.CanvasTexture(cv); tex.encoding = THREE.sRGBEncoding;
  var sphere = new THREE.Mesh(new THREE.SphereGeometry(1, 96, 64), new THREE.MeshBasicMaterial({ map: tex })); sphere.rotation.y = -Math.PI / 2; scene.add(sphere);
  var floor = new THREE.Mesh(new THREE.CircleGeometry(2.2, 64), new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.6 })); floor.rotation.x = -Math.PI / 2; floor.position.y = -1.35; scene.add(floor);
  var fv = document.getElementById('flatView'); fv.width = W; fv.height = H; var fctx = fv.getContext('2d');

  // ---- clock ----
  var p = 0, last = performance.now(), recording = false, recStart = 0;
  function tick(now) { var dt = (now - last) / 1000; last = now;
    if (recording) { p = (now - recStart) / 1000 / state.loop; if (p >= 1) { p = 0.9999; finishRecord(); } }
    else if (state.playing) { p = (p + dt / state.loop) % 1; }
    render(p); controls.update(); if (!state.showFlat) renderer.render(scene, camera); requestAnimationFrame(tick); }
  requestAnimationFrame(tick);

  // deterministic frame grab (for high-quality export pipelines)
  window.__grab = function (pp) { var was = state.playing; state.playing = false; p = ((pp % 1) + 1) % 1; render(p); state.playing = was; return cv.toDataURL('image/png'); };
  window.__info = function () { return { W: W, H: H, loop: state.loop }; };

  // ---- selects ----
  function fillSelect(sel,val){ for(var i=0;i<ORBITS.length;i++){ var o=document.createElement('option'); o.value=ORBITS[i][0]; o.textContent=ORBITS[i][1]; if(ORBITS[i][0]===val) o.selected=true; sel.appendChild(o); } }
  [0,1,2].forEach(function(i){ fillSelect(document.getElementById('o'+i), orbit[i]); });

  // ---- files ----
  var status = document.getElementById('status');
  function loadFile(file,cb){ var img=new Image(); img.onload=function(){cb(img);}; img.src=URL.createObjectURL(file); }
  function setLogoBtn(i){ var el=document.getElementById('l'+i); el.classList.toggle('set',!!logos[i]); el.textContent=logos[i]?'✓ ロゴ '+(i+1):'ロゴ '+(i+1); updateStatus(); }
  function updateStatus(){ var n=present().length; status.textContent=(bgImg?'背景○ ':'背景:'+state.bg+' ')+'ロゴ '+n+'枚'+(n?' — 周回中':'（未読込）'); }
  [0,1,2].forEach(function(i){ document.getElementById('f'+i).addEventListener('change',function(e){ if(e.target.files[0]) loadFile(e.target.files[0],function(img){ logos[i]=img; setLogoBtn(i); }); });
    document.getElementById('o'+i).addEventListener('change',function(e){ orbit[i]=e.target.value; }); });
  document.getElementById('fBg').addEventListener('change',function(e){ if(e.target.files[0]) loadFile(e.target.files[0],function(img){ bgImg=img; updateStatus(); }); });
  window.__loadLogoURL=function(i,url){ var im=new Image(); im.crossOrigin='anonymous'; im.onload=function(){ logos[i]=im; setLogoBtn(i); }; im.src=url; };
  window.__loadBgURL=function(url){ var im=new Image(); im.crossOrigin='anonymous'; im.onload=function(){ bgImg=im; updateStatus(); }; im.src=url; };

  // ---- sliders ----
  var FMT={ size:function(v){return Math.round(v*100)+'%';}, speed:function(v){return v+' 周/ループ';}, loop:function(v){return v+' 秒';}, vsweep:function(v){return v+' 回';},
    spread:function(v){return v+'°';}, pulse:function(v){return Math.round(v*100)+'%';}, bloom:function(v){return v+' px';}, trail:function(v){return v?v+' 段':'なし';},
    cycle:function(v){return v?'×'+v:'なし';}, strobe:function(v){return v?v+' 回/ループ':'なし';}, bgspd:function(v){return '×'+v;}, grain:function(v){return Math.round(v*100)+'%';} };
  var SLID={ size:'vSize',speed:'vSpeed',loop:'vLoop',vsweep:'vVsw',spread:'vSpread',pulse:'vPulse',bloom:'vBloom',trail:'vTrail',cycle:'vCycle',strobe:'vStrobe',bgspd:'vBg',grain:'vGrain' };
  Object.keys(SLID).forEach(function(key){ var el=document.getElementById(key),out=document.getElementById(SLID[key]);
    function up(){ state[key]=parseFloat(el.value); out.textContent=FMT[key](state[key]); } el.addEventListener('input',up); up(); });
  document.getElementById('bg').addEventListener('change',function(e){ state.bg=e.target.value; updateStatus(); });
  document.getElementById('accent').addEventListener('input',function(e){ state.accent=e.target.value; document.documentElement.style.setProperty('--accent',e.target.value); });

  // ---- toggles ----
  function toggle(id,key){ var b=document.getElementById(id); b.addEventListener('click',function(){ state[key]=!state[key]; b.classList.toggle('on',state[key]); }); }
  var playBtn=document.getElementById('play'); playBtn.addEventListener('click',function(){ state.playing=!state.playing; playBtn.classList.toggle('on',state.playing); playBtn.textContent=state.playing?'再生中':'停止中'; });
  var dirBtn=document.getElementById('dir'); dirBtn.addEventListener('click',function(){ state.dir*=-1; var r=state.dir>0; dirBtn.classList.toggle('on',r); dirBtn.textContent=r?'順回り':'逆回り'; });
  var viewBtn=document.getElementById('view'),flatWrap=document.getElementById('flatWrap');
  viewBtn.addEventListener('click',function(){ state.showFlat=!state.showFlat; flatWrap.style.display=state.showFlat?'grid':'none'; viewBtn.textContent=state.showFlat?'表示：平面':'表示：球'; });
  toggle('mirror','mirror'); toggle('vignette','vignette'); toggle('poles','poles');
  document.getElementById('guide').addEventListener('click',function(){ state.guide=!state.guide; this.classList.toggle('on',state.guide); });

  // ---- presets ----
  var PRESETS={
    'RED STORM':   { bg:'embers',  accent:'#ff2630', bloom:34, trail:7, mirror:false, cycle:0, strobe:0, vignette:true, grain:0.05, orbit:['d','d2','helix'], speed:2, pulse:0.09, bgspd:3, size:0.22 },
    'CHROME ORBIT':{ bg:'embers',  accent:'#ff3a48', bloom:26, trail:5, mirror:true,  cycle:0, strobe:0, vignette:true, grain:0.04, orbit:['h','ring','v'],   speed:1, pulse:0.05, bgspd:2, size:0.24 },
    'DROP RAIN':   { bg:'droprain',accent:'#ff2a2a', bloom:30, trail:3, mirror:false, cycle:0, strobe:0, vignette:true, grain:0.05, orbit:['h','h','h'],     speed:1, pulse:0.04, bgspd:4, size:0.2 },
    'STROBE PULSE':{ bg:'radial',  accent:'#ff0033', bloom:40, trail:6, mirror:false, cycle:0, strobe:6, vignette:true, grain:0.06, orbit:['fig8','fig8','v'],speed:2, pulse:0.13, bgspd:2, size:0.24 },
    'KALEIDO':     { bg:'tunnel',  accent:'#ff4455', bloom:30, trail:6, mirror:true,  cycle:1, strobe:0, vignette:true, grain:0.05, orbit:['helix','fig8','wave'],speed:2, pulse:0.06, bgspd:2, size:0.22 },
    'NEON GRID':   { bg:'grid',    accent:'#ff2266', bloom:24, trail:4, mirror:false, cycle:0, strobe:0, vignette:true, grain:0.05, orbit:['wave','h','ring'],speed:1, pulse:0.05, bgspd:2, size:0.22 },
    'STARFIELD':   { bg:'starfield',accent:'#ffffff',bloom:22, trail:2, mirror:false, cycle:0, strobe:0, vignette:true, grain:0.04, orbit:['h','v','d'],      speed:1, pulse:0.05, bgspd:2, size:0.22 },
    'MINIMAL':     { bg:'embers',  accent:'#ee3333', bloom:18, trail:2, mirror:false, cycle:0, strobe:0, vignette:false,grain:0.03, orbit:['h','v','d'],      speed:1, pulse:0.04, bgspd:1, size:0.22 },
    'NOIR ◆洗練':  { bg:'noir',    accent:'#a8121e', bloom:13, trail:0, mirror:false, cycle:0, strobe:0, vignette:true, grain:0.045,orbit:['center','center','center'], speed:1, pulse:0.03, bgspd:1, size:0.28 }
  };
  function syncUI(){ Object.keys(SLID).forEach(function(key){ var el=document.getElementById(key); if(el){ el.value=state[key]; document.getElementById(SLID[key]).textContent=FMT[key](state[key]); } });
    document.getElementById('bg').value=state.bg; document.getElementById('accent').value=state.accent; document.documentElement.style.setProperty('--accent',state.accent);
    for(var i=0;i<3;i++) document.getElementById('o'+i).value=orbit[i];
    [['mirror','mirror'],['vignette','vignette'],['poles','poles']].forEach(function(t){ document.getElementById(t[0]).classList.toggle('on',state[t[1]]); }); updateStatus(); }
  function applyPreset(name){ var ps=PRESETS[name]; if(!ps) return; for(var key in ps){ if(key==='orbit'){ orbit=ps.orbit.slice(); } else { state[key]=ps[key]; } } syncUI(); status.textContent='プリセット: '+name; }
  var pwrap=document.getElementById('presets'); Object.keys(PRESETS).forEach(function(name){ var b=document.createElement('button'); b.textContent=name; b.addEventListener('click',function(){ applyPreset(name); }); pwrap.appendChild(b); });

  // ---- export (real-time) ----
  var rec=null, chunks=[];
  function pickMime(){ var c=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']; for(var i=0;i<c.length;i++) if(window.MediaRecorder && MediaRecorder.isTypeSupported(c[i])) return c[i]; return ''; }
  document.getElementById('export').addEventListener('click',function(){ if(recording) return; if(!present().length){ status.textContent='先にロゴを読み込んでください'; return; }
    var mime=pickMime(); if(!mime){ status.textContent='この環境はWebM書き出し非対応です'; return; }
    var stream=cv.captureStream(30); rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:16000000}); chunks=[]; rec.ondataavailable=function(e){ if(e.data.size) chunks.push(e.data); };
    rec.onstop=function(){ var blob=new Blob(chunks,{type:'video/webm'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='sphere-vj_1920x992_'+state.loop+'s.webm'; a.click(); status.textContent='書き出し完了（WebM）。納品はMP4/H.264へ変換してください'; status.classList.remove('rec'); };
    recording=true; recStart=performance.now(); p=0; status.textContent='● 録画中… '+state.loop+'秒（1ループ）'; status.classList.add('rec'); rec.start(); });
  function finishRecord(){ recording=false; if(rec && rec.state!=='inactive') rec.stop(); last=performance.now(); }

  // ---- MP4 export (WebCodecs + mp4-muxer：決定論・完全ループ・ffmpeg/サーバー不要) ----
  async function exportMP4(){
    if(recording) return;
    if(!present().length){ status.textContent='先にロゴを読み込んでください'; return; }
    if(typeof VideoEncoder==='undefined' || typeof Mp4Muxer==='undefined'){ status.textContent='この環境はMP4直書き出し非対応です。WebMをご利用ください'; return; }
    var fps=30, N=Math.round(state.loop*fps);
    var cfg={ codec:'avc1.640029', width:W, height:H, bitrate:10000000, framerate:fps };
    try {
      var sup=await VideoEncoder.isConfigSupported(cfg);
      if(!sup.supported){ cfg.codec='avc1.4D4029'; sup=await VideoEncoder.isConfigSupported(cfg); }
      if(!sup.supported){ cfg.codec='avc1.42E029'; sup=await VideoEncoder.isConfigSupported(cfg); }
      if(!sup.supported){ status.textContent='H.264エンコード非対応の環境です。WebMをご利用ください'; return; }
      var muxer=new Mp4Muxer.Muxer({ target:new Mp4Muxer.ArrayBufferTarget(), video:{ codec:'avc', width:W, height:H }, fastStart:'in-memory' });
      var enc=new VideoEncoder({ output:function(chunk,meta){ muxer.addVideoChunk(chunk,meta); }, error:function(e){ status.textContent='MP4エンコードエラー: '+e.message; status.classList.remove('rec'); } });
      enc.configure(cfg);
      var was=state.playing; state.playing=false; recording=true; status.classList.add('rec');
      for(var i=0;i<N;i++){
        render(i/N);
        var vf=new VideoFrame(cv, { timestamp:Math.round(i*1e6/fps), duration:Math.round(1e6/fps) });
        enc.encode(vf, { keyFrame: i%fps===0 }); vf.close();
        if(i%6===0){ status.textContent='● MP4 書き出し中… '+Math.round(i/N*100)+'%'; await new Promise(function(r){ setTimeout(r, enc.encodeQueueSize>8?20:0); }); }
      }
      await enc.flush(); muxer.finalize();
      var blob=new Blob([muxer.target.buffer], { type:'video/mp4' });
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='sphere-vj_1920x992_'+state.loop+'s_30fps.mp4'; a.click();
      recording=false; state.playing=was; last=performance.now();
      status.textContent='MP4 書き出し完了（H.264 / 30fps / 完全ループ）'; status.classList.remove('rec');
    } catch(err){ recording=false; status.textContent='MP4書き出し失敗: '+err.message+'（WebMをお試しください）'; status.classList.remove('rec'); }
  }
  document.getElementById('exportmp4').addEventListener('click', exportMP4);

  window.addEventListener('resize',function(){ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });
  updateStatus();
})();
</script>
